<app-layout>
  <div class="main">
    <app-loader *ngIf="showLoader"></app-loader>

    <!-- Hero Section -->
    <section class="hero-section" style="background-image: url('assets/img/Awards and news.jpg');">
      <div class="container">
        <h1 class="global-page-title">{{ title }}</h1>
        <p>Explore our proud achievements and discover the latest news and publications.</p>
      </div>
    </section>

    <!-- Content Section -->
    <section class="mb-5">
      <div class="container">

        <!-- Navigation Tabs -->
        <div class="text-center">
          <div class="category-nav">
            <div class="nav-item">
              <span class="nav-link" (click)="showAwards = true; showNews = false; switchTitle()"
                [class.active]="showAwards">
                <i class="fa-solid fa-trophy me-2"></i>Awards
              </span>
            </div>
            <div class="nav-item">
              <span class="nav-link" (click)="showNews = true; showAwards = false; switchTitle()"
                [class.active]="showNews">
                <i class="fa-solid fa-newspaper me-2"></i>News Articles
              </span>
            </div>
          </div>
        </div>

        <!-- Awards List / Gallery Grid -->
        <div class="row w-100 mx-0 mt-4">
          <div class="col-12 px-0">

            <div *ngIf="showAwards" class="fade-in">
              <ul class="list-unstyled masonry-layout">
                <li *ngFor="let item of awards" class="gallery-item-wrapper card border-0 shadow-sm p-3 mb-4 rounded-4"
                  style="break-inside: avoid;">
                  <img [src]="item.image" alt="Eco-Friendly Tourism Award Image" class="gallery-image mb-3 rounded-3"
                    style="width: 100%; height: auto;">
                  <h5 class="fw-bold mb-2">{{item.header}}</h5>
                  <p class="text-muted">{{item.content}}</p>
                </li>
              </ul>
            </div>

            <div *ngIf="showNews" class="fade-in">
              <div class="masonry-layout" gallerize>
                <div *ngFor="let img of imageFilenames; let i = index" class="gallery-item-wrapper">
                  <img [src]="img" class="gallery-image" (click)="openLightbox(i, 'vanavihari')"
                    alt="News Article {{ i + 1 }}" loading="lazy" />
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </section>
  </div>
</app-layout>
