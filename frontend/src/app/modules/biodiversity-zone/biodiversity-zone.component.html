<app-layout>
  <div class="main">
    <app-loader *ngIf="showLoader"></app-loader>

    <!-- Hero Carousel -->
    <app-shared-hero-carousel 
      [slides]="heroSlides" 
      carouselId="biodiversityCarousel"
      (actionClicked)="handleSlideAction($event)">
    </app-shared-hero-carousel>

    <!-- Content Section -->
    <section class="mb-5" id="gallery-section">
      <div class="container mt-4">

        <!-- Navigation Tabs -->
        <div class="text-center">
          <div class="category-nav">
            <div class="nav-item">
              <span class="nav-link" (click)="showAnimals = true; showBirds = false; showTrees=false"
                [class.active]="showAnimals">
                <i class="fa-solid fa-paw me-2"></i>Animals
              </span>
            </div>
            <div class="nav-item">
              <span class="nav-link" (click)="showBirds = true; showAnimals = false; showTrees=false"
                [class.active]="showBirds">
                <i class="fa-solid fa-dove me-2"></i>Birds
              </span>
            </div>
            <div class="nav-item">
              <span class="nav-link" (click)="showTrees = true; showAnimals = false; showBirds=false"
                [class.active]="showTrees">
                <i class="fa-solid fa-tree me-2"></i>Trees
              </span>
            </div>
          </div>
        </div>

        <!-- Gallery Grid -->
        <div class="row w-100 mx-0 mt-4">
          <div class="col-12 px-0">

            <!-- Animals Gallery -->
            <div *ngIf="showAnimals" class="fade-in">
              <div class="masonry-layout" gallerize>
                <div *ngFor="let img of animalsFilenames; let i = index" class="gallery-item-wrapper">
                  <img style="height: 250px !important;" [src]="img" class="gallery-image"
                    (click)="openLightbox(i, 'animals')" alt="Animal {{ i + 1 }}" loading="lazy" />
                </div>
              </div>
            </div>

            <!-- Birds Gallery -->
            <div *ngIf="showBirds" class="fade-in">
              <div class="masonry-layout" gallerize>
                <div *ngFor="let img of birdsFilenames; let i = index" class="gallery-item-wrapper">
                  <img style="height: 250px !important;" [src]="img" class="gallery-image"
                    (click)="openLightbox(i, 'birds')" alt="Bird {{ i + 1 }}" loading="lazy" />
                </div>
              </div>
            </div>

            <!-- Trees Gallery -->
            <div *ngIf="showTrees" class="fade-in">
              <div class="masonry-layout" gallerize>
                <div *ngFor="let img of treesFilenames; let i = index" class="gallery-item-wrapper">
                  <img [src]="img" class="gallery-image" (click)="openLightbox(i, 'trees')" alt="Tree {{ i + 1 }}"
                    loading="lazy" />
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </section>
  </div>
</app-layout>
