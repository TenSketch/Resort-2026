<h1 mat-dialog-title>Confirmation</h1>
<div mat-dialog-content>
  <p>Do you want to change your selection?</p>
</div>
<div mat-dialog-actions>
  <button mat-button class="btn-yes" [mat-dialog-close]="true" (click)="clearData()">Yes</button>
  <button *ngIf="showCancelBtn" class="btn-cancel" mat-button [mat-dialog-close]="false">Cancel</button>
</div>
