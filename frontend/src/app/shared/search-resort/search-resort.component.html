<section class="search-rooms-container">
  <form #searchForm="ngForm" class="search-bar">
    <!-- Section 1: Resort -->
    <div class="search-section">
      <div class="search-label">Location</div>
      <mat-select
        (selectionChange)="setMinDate()"
        required
        [(ngModel)]="selectedResort"
        name="SelectResort"
        placeholder="Select Destination"
        disableOptionCentering
        panelClass="custom-select-panel"
        class="custom-mat-select"
      >
        <mat-option value="Vanavihari, Maredumilli"
          >Vanavihari, Maredumilli</mat-option
        >
        <mat-option value="Jungle Star, Valamuru"
          >Jungle Star, Valamuru</mat-option
        >
      </mat-select>
    </div>

    <div class="divider"></div>

    <!-- Section 2: Check-in -->
    <div class="search-section" (click)="picker.open()">
      <div class="search-label">Check in</div>
      <input
        matInput
        [min]="minDate"
        [max]="maxDate"
        [matDatepicker]="picker"
        name="CheckinDate"
        [(ngModel)]="checkinDate"
        required
        placeholder="Add Date"
        readonly
        class="custom-date-input"
      />
      <mat-datepicker #picker></mat-datepicker>
    </div>

    <div class="divider"></div>

    <!-- Section 3: Check-out -->
    <div class="search-section" (click)="picker1.open()">
      <div class="search-label">Check out</div>
      <input
        matInput
        [matDatepicker]="picker1"
        name="CheckOutDate"
        [(ngModel)]="checkoutDate"
        [min]="setMinCheckoutDate()"
        required
        placeholder="Add Date"
        readonly
        class="custom-date-input"
      />
      <mat-datepicker #picker1></mat-datepicker>
    </div>

    <!-- Search Button -->
    <div class="search-action">
      <button
        class="search-btn"
        [disabled]="!searchForm.valid"
        (click)="submitSearch()"
      >
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>
    </div>
  </form>
</section>

<!-- Add this HTML structure to your component's template -->
<div class="modal" tabindex="-1" *ngIf="isModalVisible" style="display: block">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Confirmation</h5>
        <button
          type="button"
          class="btn-close"
          (click)="onCancel()"
          aria-label="Close"
        ></button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to edit booking details?</p>
      </div>
      <div class="modal-footer">
        <button
          type="button"
          class="btn btn-secondary text-bg-secondary"
          (click)="onCancel()"
        >
          Cancel
        </button>
        <button type="button" class="btn btn-primary" (click)="onConfirm()">
          Switch Anyway
        </button>
      </div>
    </div>
  </div>
</div>
