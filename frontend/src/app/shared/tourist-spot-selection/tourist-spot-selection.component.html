<div class="card mb-3 tourist-card">
  <div class="row">
    <div class="col-md-5">
      <div class="containerg">
        <div class="card-containerg" #cardContainer>
          <div class="card py-0" *ngFor="let item of images; let i = index">
            <img class="img-responsive" src="{{ item }}" alt="" (click)="openLightbox(i)" />
          </div>
          <!-- Placeholder if no images -->
          <div class="card py-0" *ngIf="images.length === 0">
            <img src="assets/images/placeholder-trek.jpg" alt="No Image" class="img-responsive" />
          </div>
        </div>

        <div class="scroll-icon left" (click)="scrollLeftBtn(cardContainer)" #scrollLeftIcon>
          <i class="fas fa-chevron-left"></i>
        </div>
        <div class="scroll-icon right" (click)="scrollRightBtn(cardContainer)" #scrollRightIcon>
          <i class="fas fa-chevron-right"></i>
        </div>
      </div>
    </div>

    <div class="col-md-7 row justify-content-between m-auto">

      <!-- LEFT INFO -->
      <div class="col-md-7 p-3">

        <div class="mb-3">
          <div *ngIf="badge" class="mb-2">
            <span class="trek-badge" [ngClass]="badgeClass">
              {{ badge }}
            </span>
          </div>

          <h5 class="fw-semibold mb-1">
            {{ name }}
          </h5>

          <p class="text-muted mb-0 small">
            <i class="fas fa-map-marker-alt text-success me-2"></i>
            {{ location || 'Maredumilli, AP' }}
          </p>
        </div>

        <div class="mt-2 small">

          <p class="m-0" *ngIf="distance">
            <i class="fas fa-route text-success me-2"></i>
            <span class="text-primary-dark fw-semibold">Distance:</span>
            {{ distance }} km
          </p>

          <p class="m-0" *ngIf="elevationGain">
            <i class="fas fa-mountain text-success me-2"></i>
            <span class="text-primary-dark fw-semibold">Elevation:</span>
            {{ elevationGain }} m
          </p>

          <p class="m-0" *ngIf="timings">
            <i class="far fa-clock text-success me-2"></i>
            <span class="text-primary-dark fw-semibold">Duration:</span>
            {{ timings }}
          </p>

          <p class="m-0" *ngIf="difficulty">
            <i class="fas fa-signal text-success me-2"></i>
            <span class="text-primary-dark fw-semibold">Difficulty:</span>
            {{ difficulty }} Trek
          </p>

          <p class="m-0" *ngIf="type">
            <i class="fas fa-hiking text-success me-2"></i>
            <span class="text-primary-dark fw-semibold">Type:</span>
            {{ type }}
          </p>

        </div>

      </div>


      <!-- RIGHT PRICE + BUTTONS -->
      <div class="col-md-5 mt-2 mt-md-0 pe-md-0 p-3 d-flex flex-column justify-content-between">

        <!-- PRICE -->
        <div class="info-items text-md-end">

          <h4 class="fw-bold text-success m-0">
            <ng-container *ngIf="unitEntry !== undefined">
              {{ unitEntry | currency:'INR ':'symbol':'1.0-0' }}
            </ng-container>

            <ng-container *ngIf="unitEntry === undefined && entryFee">
              {{ entryFee }}
            </ng-container>
          </h4>

          <p class="text-muted m-0">
            / person
          </p>

        </div>


        <!-- BUTTONS -->


      </div>
      <div class="d-flex flex-row justify-content-between align-items-center gap-2 mt-3">

        <!-- DETAILS -->
        <div class="w-100">

          <ng-container *ngIf="openInNewTab; else inlineLink">
            <a [href]="detailsHref" target="_blank" rel="noopener noreferrer"
              class="btn btn-outline-success rounded-pill px-4 py-2 w-100" title="View Details">
              Details
              <i class="fas fa-arrow-right ms-2"></i>
            </a>
          </ng-container>

          <ng-template #inlineLink>
            <a [routerLink]="detailsLink" [fragment]="detailsFragment"
              class="btn btn-outline-success rounded-pill px-4 py-2 w-100" title="View Details">
              Details
              <i class="fas fa-arrow-right ms-2"></i>
            </a>
          </ng-template>

        </div>


        <!-- ADD BUTTON -->
        <button class="btn btn-success rounded-pill px-4 py-2 w-100" (click)="onAddToBooking()"
          [disabled]="isSoldOut || !isSearchPerformed"
          [title]="!isSearchPerformed ? 'Select a visit date first' : isSoldOut ? 'Sold Out' : 'Add spot'">

          <i class="fas fa-plus me-2"></i>
          {{ isSoldOut ? "Sold Out" : "Add spot" }}

        </button>

      </div>
    </div>
  </div>
</div>
