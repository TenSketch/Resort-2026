<div class="container tourist-spot-section">
  <div class="tourist-spot">
    <!-- Entry fee badge shown on top-right if fee exists -->
    <!-- Ticket-style pricing badge removed per request -->
    <div class="row">
      <!-- Left Column: Images -->
      <div class="col-md-6">
        <!-- Header moved here to be shown on the top-left above images -->
        <header class="header header-left">
          <h3 class="title">
            {{ name }}<span class="sep">,</span>
            <span class="loc">{{ location }}</span>
          </h3>
          <div class="sub" *ngIf="type">{{ type }}</div>
        </header>

        <div class="containerg" *ngIf="images?.length">
          <div class="card-containerg" #cardContainer>
            <div class="card py-0" *ngFor="let img of images; let i = index">
              <img class="img-responsive" [src]="img" [alt]="name" (click)="openLightbox(i)" />
            </div>
          </div>

          <div class="scroll-icon left" (click)="scrollLeft()">
            <i class="fas fa-chevron-left"></i>
          </div>
          <div class="scroll-icon right" (click)="scrollRight()">
            <i class="fas fa-chevron-right"></i>
          </div>
        </div>
      </div>

      <!-- Right Column: Details & Pricing (header relocated to left column) -->
      <div class="col-md-6">
        <!-- Info & Pricing Section -->
        <div class="info-pricing-section">
          <!-- Difficulty, Distance, Elevation -->
          <!-- Only show fee badges (Entry, Parking, Camera) -->
          <div class="spot-details d-flex flex-wrap gap-3 mb-3" *ngIf="
              unitEntry !== undefined ||
              unitCamera !== undefined
            ">
            <span class="badge fee-badge" *ngIf="unitEntry !== undefined">
              <strong>Trek Fee:</strong> {{ unitEntry | currency: 'INR ':'symbol':'1.0-0' }}
            </span>
            <span class="badge fee-badge" *ngIf="unitEntry === undefined && entryFee">
              <strong>Trek Fee:</strong> {{ entryFee }}
            </span>

            <span class="badge fee-badge" *ngIf="unitCamera !== undefined">
              <strong>Camera:</strong> {{ unitCamera | currency: 'INR ':'symbol':'1.0-0' }}
            </span>
            <span class="badge fee-badge" *ngIf="unitCamera === undefined && cameraFee">
              <strong>Camera:</strong> {{ cameraFee }}
            </span>
          </div>

          <!-- Map Section -->
          <div class="map-section w-100 mb-3" style="clear: both;" *ngIf="safeMapUrl">
            <div class="compact-map-card shadow-sm" style="min-height: 250px; ">
              <iframe [src]="safeMapUrl" width="100%" height="250" style="border: 0;" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
          </div>

          <!-- Actions (bottom-right) -->
          <div class="actions actions-bottom-right mt-3 d-flex justify-content-end align-items-center">
            <ng-container *ngIf="openInNewTab; else inlineLink">
              <a mat-stroked-button color="primary" [href]="detailsHref" target="_blank" rel="noopener noreferrer">View
                details</a>
            </ng-container>
            <ng-template #inlineLink>
              <a mat-stroked-button color="primary" [routerLink]="detailsLink" [fragment]="detailsFragment">View
                details</a>
            </ng-template>

            <button mat-raised-button color="primary" [disabled]="isSoldOut || !isSearchPerformed" [title]="
            !isSearchPerformed
              ? 'Select a visit date to enable booking'
              : isSoldOut
              ? 'Sold Out'
              : 'Add this spot to your booking'
          " (click)="onAddToBooking()">
              {{ isSoldOut ? "Sold Out" : "Add spot" }}
            </button>
          </div>
        </div>
      </div>
    </div>
