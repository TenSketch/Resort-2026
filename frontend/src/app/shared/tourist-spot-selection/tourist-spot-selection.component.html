<div class="card mb-3 tourist-card">
  <div class="row">
    <div class="col-md-5">
      <div class="containerg">
        <div class="card-containerg" #cardContainer>
          <div class="card py-0" *ngFor="let item of images; let i = index">
            <img class="img-responsive" src="{{ item }}" alt="" (click)="openLightbox(i)" />
          </div>
          <!-- Placeholder if no images -->
          <div class="card py-0" *ngIf="images.length === 0">
            <img src="assets/images/placeholder-trek.jpg" alt="No Image" class="img-responsive" />
          </div>
        </div>

        <div class="scroll-icon left" (click)="scrollLeftBtn(cardContainer)" #scrollLeftIcon>
          <i class="fas fa-chevron-left"></i>
        </div>
        <div class="scroll-icon right" (click)="scrollRightBtn(cardContainer)" #scrollRightIcon>
          <i class="fas fa-chevron-right"></i>
        </div>
      </div>
    </div>

    <div class="col-md-7 row justify-content-between m-auto">
      <div class="col-md-7 p-3">
        <h5>
          <span class="text-primary-dark font-weight-bold">Spot name: </span>{{ name }}
        </h5>
        <h6>
          <span class="text-primary-dark font-weight-bold">Location: </span>{{ location }}
        </h6>

        <div class="mt-2">
          <p class="m-0" *ngIf="distance">
            <span class="text-primary-dark font-weight-bold">Distance: </span>{{ distance }} km
          </p>
          <p class="m-0" *ngIf="elevationGain">
            <span class="text-primary-dark font-weight-bold">Elevation: </span>{{ elevationGain }} m
          </p>
          <p class="m-0" *ngIf="timings">
            <span class="text-primary-dark font-weight-bold">Duration: </span>{{ timings }}
          </p>
          <p class="m-0" *ngIf="difficulty">
            <span class="text-primary-dark font-weight-bold">Difficulty: </span>{{ difficulty }} Trek
          </p>
          <p class="m-0" *ngIf="type">
            <span class="text-primary-dark font-weight-bold">Type: </span>{{ type }}
          </p>
        </div>
      </div>

      <div class="col-md-5 mt-2 mt-md-0 pe-md-0 p-3">
        <!-- Price and Person Container -->
        <div class="info-items">
          <h6 class="p-0 m-0">
            <ng-container *ngIf="unitEntry !== undefined">
              <strong>{{ unitEntry | currency: 'INR ':'symbol':'1.0-0' }}</strong>
            </ng-container>
            <ng-container *ngIf="unitEntry === undefined && entryFee">
              <strong>{{ entryFee }}</strong>
            </ng-container>
          </h6>
          <p class="text-primary-dark m-0">
            <i class="fas fa-user" aria-hidden="true"></i> / person
          </p>
        </div>

        <!-- Buttons Container -->
        <div class="d-flex flex-row flex-md-column justify-content-between align-items-end gap-2 mt-3 w-100">
          <div class="d-flex justify-content-start justify-content-md-end w-100 mb-md-2">
            <ng-container *ngIf="openInNewTab; else inlineLink">
              <a [href]="detailsHref" target="_blank" rel="noopener noreferrer"
                class="btn btn-outline-primary btn-sm rounded-pill px-3 w-100 w-md-auto" title="View Details">
                Details <i class="fas fa-arrow-right ms-1"></i>
              </a>
            </ng-container>
            <ng-template #inlineLink>
              <a [routerLink]="detailsLink" [fragment]="detailsFragment"
                class="btn btn-outline-primary btn-sm rounded-pill px-3 w-100 w-md-auto" title="View Details">
                Details <i class="fas fa-arrow-right ms-1"></i>
              </a>
            </ng-template>
          </div>

          <button class="btn btn-primary btn-lg rounded-pill px-4 w-100 w-md-auto" (click)="onAddToBooking()"
            [disabled]="isSoldOut || !isSearchPerformed"
            [title]="!isSearchPerformed ? 'Select a visit date first' : isSoldOut ? 'Sold Out' : 'Add spot'">
            {{ isSoldOut ? "Sold Out" : "Add spot" }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
