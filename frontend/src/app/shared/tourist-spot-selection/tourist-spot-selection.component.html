<div class="tourist-spot-section">
  <div class="tourist-card">
    <!-- Left: Media Section -->
    <div class="tourist-card__media">
      <div
        class="gallery-wrapper"
        (click)="images.length ? openLightbox(currentImageIndex) : null"
      >
        <img
          [src]="images[currentImageIndex]"
          [alt]="name"
          *ngIf="images.length; else placeholder"
        />
        <ng-template #placeholder>
          <img src="assets/images/placeholder-trek.jpg" alt="No Image" />
        </ng-template>
      </div>

      <!-- Difficulty Badge -->
      <div
        class="difficulty-badge"
        [ngClass]="difficulty?.toLowerCase() || 'medium'"
        *ngIf="difficulty"
      >
        {{ difficulty }} Trek
      </div>

      <!-- Navigation -->
      <div
        class="nav-btn prev"
        *ngIf="images.length > 1"
        (click)="$event.stopPropagation(); scrollLeft()"
      >
        <i class="fas fa-chevron-left"></i>
      </div>
      <div
        class="nav-btn next"
        *ngIf="images.length > 1"
        (click)="$event.stopPropagation(); scrollRight()"
      >
        <i class="fas fa-chevron-right"></i>
      </div>
    </div>

    <!-- Right: Content Section -->
    <div class="tourist-card__content">
      <!-- Header -->
      <header class="header">
        <h3 class="title">{{ name }}</h3>
        <div class="location">
          <i class="fas fa-map-marker-alt"></i> {{ location }}
        </div>
      </header>

      <!-- Stats Grid -->
      <div class="stats">
        <div class="stat" *ngIf="distance">
          <span class="label">Distance</span>
          <span class="value"
            ><i class="fas fa-route"></i> {{ distance }} km</span
          >
        </div>
        <div class="stat" *ngIf="elevationGain">
          <span class="label">Elevation</span>
          <span class="value"
            ><i class="fas fa-mountain"></i> {{ elevationGain }} m</span
          >
        </div>
        <div class="stat" *ngIf="timings">
          <span class="label">Duration</span>
          <span class="value"><i class="fas fa-clock"></i> {{ timings }}</span>
        </div>
      </div>

      <!-- Features / Tags -->
      <div class="features">
        <span class="tag" *ngIf="type">{{ type }}</span>
        <!-- Dynamic features if available in future -->
      </div>

      <!-- Footer: Pricing & Actions -->
      <div class="footer">
        <div class="price-block">
          <span class="label">Starting from</span>
          <div class="price">
            <span *ngIf="unitEntry !== undefined">{{
              unitEntry | currency: "INR" : "symbol" : "1.0-0"
            }}</span>
            <span *ngIf="unitEntry === undefined && entryFee">{{
              entryFee
            }}</span>
            <small>/ person</small>
          </div>
        </div>

        <div class="actions">
          <ng-container *ngIf="openInNewTab; else inlineLink">
            <a
              [href]="detailsHref"
              target="_blank"
              rel="noopener noreferrer"
              class="btn-icon"
              title="View Details"
            >
              <i class="fas fa-arrow-right"></i>
            </a>
          </ng-container>
          <ng-template #inlineLink>
            <a
              [routerLink]="detailsLink"
              [fragment]="detailsFragment"
              class="btn-icon"
              title="View Details"
            >
              <i class="fas fa-arrow-right"></i>
            </a>
          </ng-template>

          <button
            class="btn-add"
            (click)="onAddToBooking()"
            [disabled]="isSoldOut || !isSearchPerformed"
            [title]="
              !isSearchPerformed
                ? 'Select a visit date first'
                : isSoldOut
                  ? 'Sold Out'
                  : 'Add to Booking'
            "
          >
            <i class="fas fa-plus"></i>
            {{ isSoldOut ? "Sold Out" : "Add Spot" }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
